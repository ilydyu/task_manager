services:
  app:
      build: .
      ports:
        - "8080:8080"
      depends_on:
        mysql:
          condition: service_healthy
      entrypoint: >
        sh -c "
          goose up && /task_manager
        "
      environment:
        GOOSE_DRIVER: mysql
        GOOSE_DBSTRING: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DB_NAME}?parseTime=true
        GOOSE_MIGRATION_DIR: /migrations
        MYSQL_HOST: mysql
        REDIS_ADDR: redis:6379
      env_file:
        - .env
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: task_manager
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data: